group: Eigenvec_Predictor_Moyo
exp_name: moyo_eigenvecs_predictor

render_results: True
enable_progress_bar: True

manual_seed: 42

model:
  type: eigenvecs_predictor
  model_type: PoissonNet

  outputs_at: vertices


  in_dim: 3
  out_dim: 64
  hidden_dim: 128
  num_blocks: 3

  head_type: linear

  extra_configs:
    dropout_p: 0.0
    drop_path: 0.0
    mlp_norm: False
    inner_prod_features: False
    cmlp_modulate: True
    cmlp_nlayers: 3
    cmlp_dropout: 0.0

  target_centering: False


dataset:
  name: mesh_to_eigenvecs
  data_file: data/moyo_arbitrary_source.pt

  use_subset: True
  subset_percentage: 0.001

  eigenvecs: data/tpose_eigenvectors_normalized.pt
  use_first_k_eigenvec: 64

  use_data_augmentation: True



train:
  lr: 0.001
  iterations: 240000
  batch_size: 8

  num_workers: 0

  lr_scheduler:
    type: MultiStepLR
    milestones: [20000, 80000, 200000]
    gamma: 0.1

  log_freq: 100
  save_every_n_steps: 10000

  gradient_clipping:
    enabled: True
    max_norm: 1.0
  
  loss_weights:
    mass_weighted: True


wandb: 
  enabled: False
  project: Matern_FM
  entity: tianshu-kuai